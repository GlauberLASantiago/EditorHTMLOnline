<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlauWeb Html Editor</title>
    <!-- Bibliotecas Necessárias -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #E4BAD4; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #C490D1; }

        /* Estilos do Editor Visual */
        .editor-content h1 { font-size: 2em; font-weight: bold; margin: 0.67em 0; line-height: 1.2; }
        .editor-content h2 { font-size: 1.5em; font-weight: bold; margin: 0.83em 0; line-height: 1.2; }
        .editor-content h3 { font-size: 1.17em; font-weight: bold; margin: 1em 0; line-height: 1.2; }
        .editor-content p { margin: 1em 0; line-height: 1.5; }
        .editor-content ul { list-style-type: disc; padding-left: 40px; margin: 1em 0; }
        .editor-content ol { list-style-type: decimal; padding-left: 40px; margin: 1em 0; }
        .editor-content li { display: list-item; margin: 0.25em 0; }
        .editor-content a { color: #3b82f6; text-decoration: underline; }
        
        /* Reset para classes de sumário */
        .editor-content .toc ol, .editor-content .toc ul, 
        .editor-content .sumario ol, .editor-content .sumario ul { 
            list-style-type: none !important; 
            padding-left: 0 !important; 
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useMemo } = React;

        // Ícones via Lucide
        const Icon = ({ name, size = 16, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons({
                        attrs: { 
                            class: className,
                            width: size,
                            height: size
                        },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, size, className]);
            return <i data-lucide={name} className={className}></i>;
        };

        const ToolbarButton = ({ icon, onClick, tooltip, label }) => (
            <button 
                onMouseDown={e => e.preventDefault()} 
                onClick={onClick} 
                title={tooltip}
                className="p-1.5 flex items-center justify-center text-[#756D79] hover:bg-[#F6DFEB] hover:text-[#C490D1] rounded transition-colors focus:outline-none"
            >
                {icon}
                {label && <span className="ml-1 text-[9px] font-bold uppercase">{label}</span>}
            </button>
        );

        function App() {
            const [html, setHtml] = useState(
`<div style="text-align: center; padding: 20px;">
  <h1 style="color: #C490D1; font-family: sans-serif;">Bem-vindo ao GlauWeb</h1>
  <p style="color: #756D79; font-size: 18px;">Comece a editar o <strong>texto</strong> ou o código HTML.</p>
</div>
<ul style="color: #756D79; font-family: sans-serif;">
  <li>Coluna 1: Código Fonte puro</li>
  <li>Coluna 2: Editor Visual rico</li>
  <li>Coluna 3: Pré-visualização final</li>
</ul>`
            );
            
            const [device, setDevice] = useState('desktop');
            const [fileName, setFileName] = useState('index');
            const [savedRange, setSavedRange] = useState(null);
            const [showEmojiPicker, setShowEmojiPicker] = useState(false);
            const [showMusicPicker, setShowMusicPicker] = useState(false);
            const [showColorPicker, setShowColorPicker] = useState(false);
            const [customColor, setCustomColor] = useState('');
            const visualEditorRef = useRef(null);
            const iframeRef = useRef(null);

            const emojisComuns = ['😀', '😂', '🥰', '😎', '🤔', '👍', '👎', '🙌', '🔥', '✨', '⭐', '❤️', '💡', '✅', '❌'];
            const emojisMusicais = ['🎵', '🎶', '🎼', '🎹', '🥁', '🎷', '🎺', '🎸', '🪕', '🎻', '🎤', '🎧', '📻', '👩‍🎤', '👨‍🎤'];
            const simbolosMusicais = ['♩', '♪', '♫', '♬', '♭', '♮', '♯', '𝄪', '𝄫', '𝄞', '𝄢', '𝄡', '𝄀', '𝄁', '𝄂', '𝄃', '𝄄', '𝄅', '𝄆', '𝄇', '𝄐', '𝄑', '𝄽', '𝄾', '𝄿', '𝅀', '𝅁', '𝅂', '𝅃', '𝅄', '𝅅', '𝅝', '𝅗𝅥', '𝅘𝅥', '𝅘𝅥𝅮', '𝅘𝅥𝅯', '𝅘𝅥𝅰', '𝅘𝅥𝅱', '𝅘𝅥𝅲', '𝆏', '𝆑', '𝆎', '𝆍', '𝆌', '𝆖', '𝆗', '𝆘', '𝆙'];

            const paletas = [
                { titulo: 'GlauWeb', grid: 'grid-cols-6', cores: ['#A7D7C5', '#F7F4E9', '#F6DFEB', '#E4BAD4', '#C490D1', '#756D79'] },
                { titulo: 'Padrão', grid: 'grid-cols-8', cores: ['#000000', '#434343', '#666666', '#999999', '#CCCCCC', '#FFFFFF', '#FF0000', '#FF9900', '#FFFF00', '#00FF00', '#00FFFF', '#0000FF', '#9900FF', '#FF00FF'] }
            ];

            // Sincronização do Preview via Iframe Document Write (mais estável que srcDoc)
            useEffect(() => {
                const iframe = iframeRef.current;
                if (iframe) {
                    const doc = iframe.contentDocument || iframe.contentWindow.document;
                    const content = `
                        <!DOCTYPE html>
                        <html>
                        <head>
                            <meta charset="utf-8">
                            <style>
                                body { margin: 0; font-family: sans-serif; word-wrap: break-word; padding: 1rem; color: #333; }
                                .toc ol, .toc ul, .sumario ol, .sumario ul { list-style-type: none !important; padding-left: 0 !important; }
                                a { color: #3b82f6; }
                            </style>
                        </head>
                        <body>${html}</body>
                        </html>
                    `;
                    doc.open();
                    doc.write(content);
                    doc.close();
                }
            }, [html]);

            // Sincronização do Editor Visual quando o HTML muda
            useEffect(() => {
                if (visualEditorRef.current && visualEditorRef.current.innerHTML !== html) {
                    visualEditorRef.current.innerHTML = html;
                }
            }, [html]);

            const saveSelection = () => {
                const sel = window.getSelection();
                if (sel.rangeCount > 0 && visualEditorRef.current?.contains(sel.anchorNode)) {
                    setSavedRange(sel.getRangeAt(0));
                }
            };

            const restoreSelection = () => {
                if (savedRange) {
                    const sel = window.getSelection();
                    sel.removeAllRanges();
                    sel.addRange(savedRange);
                }
                visualEditorRef.current?.focus();
            };

            const execCommand = (cmd, val = null) => {
                restoreSelection();
                document.execCommand(cmd, false, val);
                setHtml(visualEditorRef.current.innerHTML);
                saveSelection();
            };

            const handleFormatParagraph = () => {
                restoreSelection();
                const sel = window.getSelection();
                if (sel.rangeCount > 0) {
                    let node = sel.anchorNode;
                    if (node?.nodeType === 3) node = node.parentNode;
                    const list = node?.closest('ul, ol');
                    if (list) {
                        const cmd = list.tagName === 'UL' ? 'insertUnorderedList' : 'insertOrderedList';
                        document.execCommand(cmd, false, null);
                    }
                }
                document.execCommand('formatBlock', false, 'p');
                setHtml(visualEditorRef.current.innerHTML);
            };

            const handleInsertLink = () => {
                const url = prompt('URL:', 'https://');
                if (url) execCommand('createLink', url);
            };

            const handleColor = (color) => {
                document.execCommand('styleWithCSS', false, true);
                execCommand('foreColor', color);
                setShowColorPicker(false);
            };

            const handleSave = () => {
                const blob = new Blob([html], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${fileName || 'index'}.html`;
                a.click();
            };

            return (
                <div className="h-screen w-full flex flex-col bg-[#F7F4E9] text-[#756D79] font-sans overflow-hidden">
                    <header className="flex flex-col sm:flex-row items-center justify-between px-6 py-3 bg-white border-b border-[#E4BAD4] shadow-sm z-10 gap-4 sm:gap-0">
                        <div className="flex items-center gap-3">
                            <div className="bg-[#C490D1] p-2 rounded-lg text-white">
                                <Icon name="code-2" size={24} />
                            </div>
                            <h1 className="text-xl font-bold tracking-tight">GlauWeb <span className="text-[#C490D1]">Html Editor</span></h1>
                        </div>
                        
                        <div className="flex items-center gap-3">
                            <div className="flex items-center bg-[#F7F4E9] border border-[#E4BAD4] rounded-md overflow-hidden">
                                <input value={fileName} onChange={e => setFileName(e.target.value)} className="bg-transparent px-3 py-1.5 text-sm outline-none w-32" />
                                <span className="px-2 py-1.5 bg-[#F6DFEB] text-xs font-bold">.html</span>
                            </div>
                            <button onClick={handleSave} className="bg-[#A7D7C5] px-4 py-1.5 rounded-md font-bold flex items-center gap-2 shadow-sm">
                                <Icon name="save" size={18} /> Salvar
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 flex flex-col lg:flex-row overflow-hidden">
                        {/* Código */}
                        <section className="flex-1 flex flex-col border-r border-[#E4BAD4] bg-gray-900">
                            <div className="px-4 py-2 bg-[#756D79] text-[#F7F4E9] text-xs font-bold uppercase tracking-wider flex items-center gap-2">
                                <Icon name="code-2" size={14} className="text-[#A7D7C5]"/> Código HTML
                            </div>
                            <textarea 
                                value={html} 
                                onChange={e => setHtml(e.target.value)}
                                className="flex-1 w-full p-4 font-mono text-sm bg-gray-900 text-[#A7D7C5] outline-none resize-none custom-scrollbar"
                            />
                        </section>

                        {/* Editor */}
                        <section className="flex-[1.5] flex flex-col bg-white border-r border-[#E4BAD4] lg:w-[45%]">
                            <div className="p-2 bg-[#F6DFEB] border-b border-[#E4BAD4] flex flex-wrap gap-1 items-center shadow-sm">
                                <ToolbarButton icon={<Icon name="undo" size={16}/>} onClick={() => execCommand('undo')} />
                                <ToolbarButton icon={<Icon name="redo" size={16}/>} onClick={() => execCommand('redo')} />
                                <div className="w-px h-5 bg-[#E4BAD4] mx-1"></div>
                                
                                <select onChange={e => execCommand('fontName', e.target.value)} className="text-[10px] p-1 border rounded bg-[#F7F4E9]">
                                    <option value="">Fonte</option>
                                    <option value="Arial">Arial</option>
                                    <option value="Times New Roman">Times</option>
                                    <option value="Verdana">Verdana</option>
                                </select>

                                <select onChange={e => execCommand('fontSize', e.target.value)} className="text-[10px] p-1 border rounded bg-[#F7F4E9] w-12">
                                    <option value="">Tam</option>
                                    {[1,2,3,4,5,6,7].map(n => <option key={n} value={n}>{n}</option>)}
                                </select>

                                <div className="w-px h-5 bg-[#E4BAD4] mx-1"></div>
                                <ToolbarButton icon={<Icon name="bold" size={16}/>} onClick={() => execCommand('bold')} />
                                <ToolbarButton icon={<Icon name="italic" size={16}/>} onClick={() => execCommand('italic')} />
                                <ToolbarButton icon={<Icon name="underline" size={16}/>} onClick={() => execCommand('underline')} />

                                <div className="relative">
                                    <ToolbarButton icon={<Icon name="palette" size={16}/>} onClick={() => { saveSelection(); setShowColorPicker(!showColorPicker); }} />
                                    {showColorPicker && (
                                        <div className="absolute top-full left-0 mt-1 bg-white border p-3 rounded-lg shadow-xl z-50 w-64">
                                            {paletas.map((p, i) => (
                                                <div key={i} className="mb-2">
                                                    <p className="text-[10px] font-bold mb-1 uppercase">{p.titulo}</p>
                                                    <div className={`grid ${p.grid} gap-1`}>
                                                        {p.cores.map(c => <button key={c} onClick={() => handleColor(c)} className="w-full aspect-square border" style={{backgroundColor: c}} />)}
                                                    </div>
                                                </div>
                                            ))}
                                            <div className="flex gap-1 mt-2 border-t pt-2">
                                                <input value={customColor} onChange={e => setCustomColor(e.target.value)} className="flex-1 text-[10px] border p-1" placeholder="#HEX" />
                                                <button onClick={() => handleColor(customColor)} className="bg-[#C490D1] text-white text-[10px] px-2 rounded">OK</button>
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <ToolbarButton icon={<Icon name="eraser" size={16}/>} onClick={() => execCommand('removeFormat')} label="LIMPAR" />
                                <div className="w-px h-5 bg-[#E4BAD4] mx-1"></div>

                                <ToolbarButton icon={<span className="font-bold">P</span>} onClick={handleFormatParagraph} label="NORMAL" />
                                <ToolbarButton icon={<Icon name="heading-1" size={16}/>} onClick={() => execCommand('formatBlock', 'h1')} />
                                <ToolbarButton icon={<Icon name="heading-2" size={16}/>} onClick={() => execCommand('formatBlock', 'h2')} />

                                <div className="w-px h-5 bg-[#E4BAD4] mx-1"></div>
                                <ToolbarButton icon={<Icon name="align-left" size={16}/>} onClick={() => execCommand('justifyLeft')} />
                                <ToolbarButton icon={<Icon name="align-center" size={16}/>} onClick={() => execCommand('justifyCenter')} />
                                <ToolbarButton icon={<Icon name="align-justify" size={16}/>} onClick={() => execCommand('justifyFull')} />
                                
                                <div className="w-px h-5 bg-[#E4BAD4] mx-1"></div>
                                <ToolbarButton icon={<Icon name="list" size={16}/>} onClick={() => execCommand('insertUnorderedList')} />
                                <ToolbarButton icon={<Icon name="list-ordered" size={16}/>} onClick={() => execCommand('insertOrderedList')} />
                                
                                <div className="w-px h-5 bg-[#E4BAD4] mx-1"></div>
                                <ToolbarButton icon={<Icon name="link" size={16}/>} onClick={handleInsertLink} />
                                
                                <div className="relative">
                                    <ToolbarButton icon={<Icon name="music" size={16}/>} onClick={() => { saveSelection(); setShowMusicPicker(!showMusicPicker); }} />
                                    {showMusicPicker && (
                                        <div className="absolute top-full right-0 mt-1 bg-white border p-2 rounded shadow-xl z-50 w-64 max-h-48 overflow-y-auto grid grid-cols-6 gap-1 custom-scrollbar">
                                            {simbolosMusicais.map((s, i) => <button key={i} onClick={() => { execCommand('insertText', s); setShowMusicPicker(false); }} className="hover:bg-gray-100 p-1 text-lg">{s}</button>)}
                                        </div>
                                    )}
                                </div>
                            </div>
                            <div 
                                ref={visualEditorRef}
                                contentEditable 
                                onInput={handleVisualChange}
                                onMouseUp={saveSelection}
                                onKeyUp={saveSelection}
                                className="flex-1 p-8 outline-none editor-content custom-scrollbar overflow-auto"
                                suppressContentEditableWarning={true}
                            />
                        </section>

                        {/* Preview */}
                        <section className="flex-1 flex flex-col bg-[#F7F4E9]">
                            <div className="px-4 py-2 bg-white border-b border-[#E4BAD4] flex justify-between items-center">
                                <div className="text-xs font-bold uppercase flex items-center gap-2"><Icon name="monitor-play" size={14}/> Preview</div>
                                <div className="flex bg-[#F7F4E9] p-0.5 rounded border border-[#E4BAD4]">
                                    <button onClick={() => setDevice('desktop')} className={`px-2 py-1 text-[10px] font-bold rounded ${device === 'desktop' ? 'bg-[#C490D1] text-white' : ''}`}>PC</button>
                                    <button onClick={() => setDevice('mobile')} className={`px-2 py-1 text-[10px] font-bold rounded ${device === 'mobile' ? 'bg-[#C490D1] text-white' : ''}`}>CEL</button>
                                </div>
                            </div>
                            <div className="flex-1 flex justify-center p-6 overflow-auto custom-scrollbar">
                                <div className={`transition-all duration-500 bg-white shadow-xl ${device === 'mobile' ? 'w-[340px] h-[600px] border-[12px] border-[#756D79] rounded-[2.5rem]' : 'w-full h-full border border-[#E4BAD4] rounded'}`}>
                                    <iframe ref={iframeRef} className="w-full h-full border-0" title="preview" />
                                </div>
                            </div>
                        </section>
                    </main>

                    <footer className="bg-[#756D79] text-[#F7F4E9] py-2 px-6 flex justify-between items-center text-[10px]">
                        <p>Desenvolvido pelo professor Glauber Santiago — DAC/UFSCar</p>
                        <div className="flex gap-4">
                            <a href="https://servidores.ufscar.br/glauber/" target="_blank">servidores.ufscar.br/glauber/</a>
                            <a href="https://sites.google.com/view/glauberia" target="_blank">sites.google.com/view/glauberia</a>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
